<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yakıt Takip Asistanı Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

    <style>
        :root {
            --primary: #002c5f; --accent: #e63946;
            --bg-grad: linear-gradient(135deg, #e2e2e2 0%, #9bc5c3 100%);
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #222222; --text-muted: #555555; --input-bg: rgba(255, 255, 255, 0.9);
        }
        body.theme-gece {
            --primary: #4facfe; --accent: #ff4757;
            --bg-grad: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(20, 20, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff; --text-muted: #cccccc; --input-bg: rgba(0, 0, 0, 0.6);
        }
        body.theme-nline {
            --primary: #e63946; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #121212 0%, #2b2b2b 100%);
            --glass-bg: rgba(30, 30, 30, 0.8); --glass-border: rgba(230, 57, 70, 0.3);
            --text-main: #f1f1f1; --text-muted: #aaaaaa; --input-bg: rgba(15, 15, 15, 0.9);
        }
        body.theme-elite {
            --primary: #b0bec5; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #263238 0%, #101418 100%);
            --glass-bg: rgba(40, 50, 56, 0.7); --glass-border: rgba(176, 190, 197, 0.2);
            --text-main: #eceff1; --text-muted: #90a4ae; --input-bg: rgba(20, 26, 30, 0.8);
        }

        /* Firebase Özel Kart */
        .cloud-card { background: linear-gradient(135deg, rgba(66, 133, 244, 0.1), var(--glass-bg)) !important; border: 1px solid rgba(66, 133, 244, 0.3) !important; }
        .btn-google { background: #fff; color: #444; border: none; border-radius: 12px; padding: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; font-size: 13px; margin-top: 10px; }
        .user-sync-info { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .user-meta img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--primary); }
        .sync-indicator { font-size: 10px; color: #2ecc71; font-weight: 800; display: block; }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { background: var(--bg-grad); height: 100%; overflow: hidden; }
        body { background: var(--bg-grad); background-attachment: fixed; color: var(--text-main); transition: all 0.5s ease; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .rpm-container-vip { position: relative; width: 320px; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .rpm-gauge-vip { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .gauge-bar-vip { stroke-width: 12; stroke-linecap: round; stroke-dasharray: 520; stroke-dashoffset: 520; animation: revUpVIP 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        #needle { transform-origin: 160px 160px; transform: rotate(-135deg); transition: transform 0.05s linear; }
        .rpm-text-vip { position: absolute; top: 190px; display: flex; flex-direction: column; align-items: center; }
        #rpmValueVip { font-size: 55px; font-weight: 800; color: #fff; line-height: 1; }
        @keyframes revUpVIP { 0% { stroke-dashoffset: 520; } 100% { stroke-dashoffset: 0; } }

        .main-content { display: block; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .card-title { font-size: 16px; margin-bottom: 15px; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: var(--glass-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px; background: var(--input-bg); }
        
        body.privacy-mode .money-blur { filter: blur(6px); opacity: 0.6; }
    </style>
</head>
<body onload="uygulamayiBaslat()">

    <div id="splashScreen">
        <div class="rpm-container-vip">
            <svg class="rpm-gauge-vip" viewBox="0 0 320 320">
                <path d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="#111" stroke-width="6"/>
                <path class="gauge-bar-vip" d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="#e63946" />
                <g id="needle">
                    <polygon points="157,160 163,160 160,55" fill="#fff"/>
                    <circle cx="160" cy="160" r="10" fill="#4facfe"/>
                </g>
            </svg>
            <div class="rpm-text-vip"><span id="rpmValueVip">0</span> <small style="color:#fff">RPM</small></div>
        </div>
    </div>

    <div class="main-content" id="mainApp" style="display:none;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-size: 18px; font-weight: 800; color: var(--primary);">YAKIT TAKİP PRO</h1>
            <div onclick="togglePrivacy()" style="cursor:pointer; color: var(--text-muted);"><i class="fas fa-eye-slash" id="privacyIcon"></i></div>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-wallet"></i> Toplam Harcama</h2>
                <h3 id="dashTotalCost" class="money-blur" style="font-size: 32px; font-weight: 800;">0 ₺</h3>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fas fa-chart-line"></i> Tüketim Trendi</h2>
                <canvas id="yakitGrafigi" style="height: 150px;"></canvas>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> Yeni Kayıt</h2>
                <div class="input-group"><label>KM</label><input type="number" id="km" placeholder="Örn: 45000"></div>
                <div class="input-group"><label>Litre</label><input type="number" step="0.01" id="litre" placeholder="Örn: 40"></div>
                <div class="input-group"><label>Litre Fiyatı</label><input type="number" step="0.01" id="fiyat" placeholder="Örn: 43.50"></div>
                <button class="btn" onclick="veriEkle()">KAYDET</button>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-history"></i> Geçmiş Kayıtlar</h2>
                <div class="table-responsive">
                    <table style="width: 100%; border-collapse: collapse;">
                        <tbody id="tabloGövdesi"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="card cloud-card">
                <h2 class="card-title" style="color: #4285F4;"><i class="fas fa-cloud"></i> Bulut Yedekleme</h2>
                <div id="loggedOutUI">
                    <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;">Verilerinizi senkronize etmek için Google ile bağlanın.</p>
                    <button class="btn-google" onclick="firebaseGirisYap()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="G"> Google ile Giriş Yap
                    </button>
                </div>
                <div id="loggedInUI" style="display: none;">
                    <div class="user-sync-info">
                        <div class="user-meta">
                            <img id="userPhoto" src="" alt="Profil">
                            <div>
                                <h4 id="userName" style="font-size: 13px; margin: 0;">Sürücü</h4>
                                <span class="sync-indicator" id="syncStatus">Bulut Eşitlendi ✓</span>
                            </div>
                        </div>
                        <button onclick="firebaseCikisYap()" style="background:none; border:none; color:var(--accent); font-weight:800; font-size:12px;">Çıkış</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-palette"></i> Tema</h2>
                <button class="btn" onclick="temaSec('gece')">Gece Modu</button>
                <button class="btn btn-outline" onclick="temaSec('standart')">Gündüz Modu</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="sekmeDegistir('dashboard', this)"><i class="fas fa-home"></i><span>Ana Sayfa</span></div>
        <div class="nav-item" onclick="sekmeDegistir('add', this)"><i class="fas fa-plus"></i><span>Ekle</span></div>
        <div class="nav-item" onclick="sekmeDegistir('history', this)"><i class="fas fa-list"></i><span>Geçmiş</span></div>
        <div class="nav-item" onclick="sekmeDegistir('profile', this)"><i class="fas fa-cog"></i><span>Ayarlar</span></div>
    </div>

    <script>
        // --- SENİN FIREBASE KONFİGÜRASYONUN ---
        const firebaseConfig = {
            apiKey: "AIzaSyAYJdXZLattRESMO-Udag_NV8KPtSexUiQ",
            authDomain: "yakittakippro.firebaseapp.com",
            projectId: "yakittakippro",
            storageBucket: "yakittakippro.firebasestorage.app",
            messagingSenderId: "73308208440",
            appId: "1:73308208440:web:8d8a8bd8612a085eb615cd",
            measurementId: "G-4MEL63NWM0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const analytics = firebase.analytics();

        let yakitVerileri = JSON.parse(localStorage.getItem('app_data_car')) || [];
        let yakitGrafigi;

        // Firebase Giriş/Çıkış
        function firebaseGirisYap() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert("Giriş Hatası: " + e.message));
        }
        function firebaseCikisYap() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loggedOutUI').style.display = 'none';
                document.getElementById('loggedInUI').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
                bulutSenkronizasyonu(user.uid);
            }
        });

        async function bulutSenkronizasyonu(uid) {
            const docRef = db.collection("users").doc(uid);
            const status = document.getElementById('syncStatus');
            
            // Buluttan çek
            const doc = await docRef.get();
            if (doc.exists && yakitVerileri.length === 0) {
                yakitVerileri = doc.data().car_data || [];
                localStorage.setItem('app_data_car', JSON.stringify(yakitVerileri));
                ekraniGuncelle();
            }
            
            // Buluta yükle
            await docRef.set({ car_data: yakitVerileri, lastSync: new Date().toISOString() }, { merge: true });
            status.innerText = "Bulut Eşitlendi ✓";
        }

        // --- UYGULAMA FONKSİYONLARI ---
        function uygulamayiBaslat() {
            let rpm = document.getElementById("rpmValueVip");
            let needle = document.getElementById("needle");
            let start = null;

            function step(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let val = Math.min((progress / 2000) * 8000, 8000);
                let angle = -135 + (val / 8000) * 270;
                needle.style.transform = `rotate(${angle}deg)`;
                rpm.innerText = Math.floor(val);
                if (progress < 2000) window.requestAnimationFrame(step);
                else {
                    document.getElementById('splashScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    ekraniGuncelle();
                }
            }
            window.requestAnimationFrame(step);
        }

        function sekmeDegistir(sekme, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + sekme).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(sekme === 'dashboard') ekraniGuncelle();
        }

        function togglePrivacy() {
            document.body.classList.toggle('privacy-mode');
            let icon = document.getElementById('privacyIcon');
            icon.className = document.body.classList.contains('privacy-mode') ? "fas fa-eye" : "fas fa-eye-slash";
        }

        function temaSec(tema) {
            document.body.className = '';
            if(tema !== 'standart') document.body.classList.add('theme-' + tema);
        }

        function veriEkle() {
            let km = document.getElementById('km').value;
            let l = document.getElementById('litre').value;
            let f = document.getElementById('fiyat').value;
            if(!km || !l || !f) return alert("Eksik veri!");

            yakitVerileri.push({ id: Date.now(), km, litre: l, tutar: (l*f).toFixed(2), tarih: new Date().toLocaleDateString('tr-TR') });
            localStorage.setItem('app_data_car', JSON.stringify(yakitVerileri));
            if(auth.currentUser) bulutSenkronizasyonu(auth.currentUser.uid);
            ekraniGuncelle();
            sekmeDegistir('dashboard', document.querySelector('.nav-item'));
        }

        function ekraniGuncelle() {
            let total = 0;
            let tablo = document.getElementById('tabloGövdesi');
            tablo.innerHTML = "";
            yakitVerileri.slice().reverse().forEach(v => {
                total += parseFloat(v.tutar);
                tablo.innerHTML += `<tr style="border-bottom: 1px solid var(--glass-border);"><td style="padding:10px">${v.tarih}</td><td style="padding:10px">${v.km} KM</td><td style="padding:10px" class="money-blur">${v.tutar} ₺</td></tr>`;
            });
            document.getElementById('dashTotalCost').innerText = total.toFixed(0) + " ₺";
            grafikCiz();
        }

        function grafikCiz() {
            let ctx = document.getElementById('yakitGrafigi').getContext('2d');
            if(yakitGrafigi) yakitGrafigi.destroy();
            yakitGrafigi = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yakitVerileri.map(v => v.tarih),
                    datasets: [{ data: yakitVerileri.map(v => v.tutar), borderColor: '#002c5f', tension: 0.4, fill: true, backgroundColor: 'rgba(0,44,95,0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }
    </script>
</body>
</html>
