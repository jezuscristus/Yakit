<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yakıt Takip Asistanı Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002c5f">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #002c5f; --accent: #e63946;
            --bg-grad: linear-gradient(135deg, #e2e2e2 0%, #9bc5c3 100%);
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #222222; --text-muted: #555555; --input-bg: rgba(255, 255, 255, 0.9);
        }
        html.theme-gece, body.theme-gece {
            --primary: #4facfe; --accent: #ff4757;
            --bg-grad: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(20, 20, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff; --text-muted: #cccccc; --input-bg: rgba(0, 0, 0, 0.6);
        }
        html.theme-nline, body.theme-nline {
            --primary: #e63946; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #121212 0%, #2b2b2b 100%);
            --glass-bg: rgba(30, 30, 30, 0.8); --glass-border: rgba(230, 57, 70, 0.3);
            --text-main: #f1f1f1; --text-muted: #aaaaaa; --input-bg: rgba(15, 15, 15, 0.9);
        }
        html.theme-elite, body.theme-elite {
            --primary: #b0bec5; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #263238 0%, #101418 100%);
            --glass-bg: rgba(40, 50, 56, 0.7); --glass-border: rgba(176, 190, 197, 0.2);
            --text-main: #eceff1; --text-muted: #90a4ae; --input-bg: rgba(20, 26, 30, 0.8);
        }
        html.theme-eco, body.theme-eco {
            --primary: #2ecc71; --accent: #f1c40f;
            --bg-grad: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(20, 35, 30, 0.7); --glass-border: rgba(46, 204, 113, 0.2);
            --text-main: #ffffff; --text-muted: #a3c2b1; --input-bg: rgba(10, 20, 15, 0.8);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { background: var(--bg-grad); height: 100%; overflow: hidden; transition: background 0.5s ease; }
        body { background: transparent; color: var(--text-main); height: 100dvh; min-height: -webkit-fill-available; overflow: hidden; display: flex; flex-direction: column; perspective: 1000px; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* REKLAM ALANI */
        .ad-container { width: 100%; min-height: 80px; background: rgba(0,0,0,0.03); border: 1px dashed rgba(0,0,0,0.1); border-radius: 15px; margin: 15px 0; display: flex; align-items: center; justify-content: center; position: relative; }
        .ad-label { position: absolute; top: 4px; left: 8px; font-size: 8px; text-transform: uppercase; opacity: 0.4; }
        .ad-placeholder { font-size: 11px; font-weight: 600; opacity: 0.3; text-align: center; }

        /* AÇILIŞ EKRANI */
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
        .rpm-gauge-vip { width: 320px; height: 320px; }
        #needle { transform-origin: 160px 160px; transform: rotate(-135deg); transition: transform 0.05s linear; }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--glass-bg); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-card h3 { font-size: 18px; font-weight: 800; }
        
        /* INPUT DÜZELTMELERİ */
        .input-group input, .input-group select { 
            width: 100% !important; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); 
            background: var(--input-bg); color: var(--text-main); font-size: 14px; -webkit-appearance: none; 
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: calc(75px + env(safe-area-inset-bottom)); background: var(--glass-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; width: 25%; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body onload="uygulamayiBaslat()">

    <div id="splashScreen">
        <svg class="rpm-gauge-vip" viewBox="0 0 320 320">
            <path d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="#111" stroke-width="6"/>
            <path d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="#e63946" stroke-width="12" stroke-dasharray="2 13" />
            <g id="needle"><polygon points="157,160 163,160 160,55" fill="#fff"/></g>
        </svg>
        <h1 style="color:white; margin-top:20px; letter-spacing:3px;">YAKIT TAKİP PRO</h1>
    </div>

    <div class="main-content">
        <div id="tab-dashboard" class="tab-content active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div>
                    <p style="font-size: 12px; opacity:0.7;">İyi Sürüşler,</p>
                    <h1 id="userName" style="font-size: 22px; font-weight:800;">Sürücü</h1>
                </div>
                <img src="" id="userPhoto" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--primary); display:none;">
            </div>

            <div class="dashboard-grid">
                <div class="stat-card"><p style="font-size:10px;">Ortalama</p><h3 id="dashAvg">- L</h3></div>
                <div class="stat-card"><p style="font-size:10px;">Harcama</p><h3 id="dashTotal">0 ₺</h3></div>
                <div class="stat-card"><p style="font-size:10px;">Menzil</p><h3 id="dashRange">- KM</h3></div>
                <div class="stat-card"><p style="font-size:10px;">TL / KM</p><h3 id="dashCostKm">- ₺</h3></div>
            </div>

            <div class="ad-container">
                <span class="ad-label">Sponsorlu</span>
                <div class="ad-placeholder"><i class="fas fa-shield-alt"></i> Trafik Sigortası Teklifleri İçin Tıklayın</div>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-chart-line"></i> Tüketim Trendi</h2>
                <canvas id="fuelChart" style="height: 180px;"></canvas>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> Yakıt Bilgisi Ekle</h2>
                <div class="input-group"><label>Tarih</label><input type="date" id="tarih"></div>
                <div class="input-group"><label>Güncel KM</label><input type="number" id="km" placeholder="Örn: 45000"></div>
                <div class="input-group"><label>Alınan Litre</label><input type="number" step="0.01" id="litre" placeholder="Örn: 40.5"></div>
                <div class="input-group"><label>Litre Fiyatı (₺)</label><input type="number" step="0.01" id="fiyat" placeholder="43.50"></div>
                <button onclick="veriEkle()" style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:800;">KAYDET VE SENKRONİZE ET</button>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="card" id="loginCard">
                <h2 class="card-title"><i class="fas fa-cloud"></i> Bulut Yedekleme</h2>
                <p style="font-size:12px; margin-bottom:15px;">Verilerini Google hesabınla eşle, asla kaybetme.</p>
                <button onclick="login()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:white; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <i class="fab fa-google" style="color:#ea4335;"></i> Google ile Giriş Yap
                </button>
            </div>

            <div class="card" id="userCard" style="display:none;">
                <h2 class="card-title"><i class="fas fa-user-check"></i> Hesap Bağlı</h2>
                <p id="userEmail" style="font-size:12px;"></p>
                <button onclick="logout()" style="margin-top:10px; color:var(--accent); background:none; border:none; font-weight:600;">Çıkış Yap</button>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-palette"></i> Arayüz Teması</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button onclick="temaSec('standart')" style="padding:10px; border-radius:8px; border:none; background:#002c5f; color:white;">Gündüz</button>
                    <button onclick="temaSec('gece')" style="padding:10px; border-radius:8px; border:none; background:#141e30; color:white;">Gece</button>
                    <button onclick="temaSec('nline')" style="padding:10px; border-radius:8px; border:none; background:#e63946; color:white;">N-Line</button>
                    <button onclick="temaSec('eco')" style="padding:10px; border-radius:8px; border:none; background:#2ecc71; color:white;">Eco</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="sekmeDegistir('dashboard', this)"><i class="fas fa-home"></i><span>Panel</span></div>
        <div class="nav-item" onclick="sekmeDegistir('add', this)"><i class="fas fa-gas-pump"></i><span>Ekle</span></div>
        <div class="nav-item" onclick="sekmeDegistir('settings', this)"><i class="fas fa-cog"></i><span>Ayarlar</span></div>
    </div>

<script>
    // FIREBASE AYARLARI
    const firebaseConfig = {
      apiKey: "AIzaSyAYJdXZLattRESMO-Udag_NV8KPtSexUiQ",
      authDomain: "yakittakippro.firebaseapp.com",
      projectId: "yakittakippro",
      storageBucket: "yakittakippro.firebasestorage.app",
      messagingSenderId: "73308208440",
      appId: "1:73308208440:web:8d8a8bd8612a085eb615cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let yakitVerileri = JSON.parse(localStorage.getItem('yakit_v4')) || [];
    let currentUser = null;

    function uygulamayiBaslat() {
        document.getElementById('tarih').valueAsDate = new Date();
        
        // RPM Animasyonu
        let needle = document.getElementById("needle");
        setTimeout(() => { needle.style.transform = "rotate(100deg)"; }, 500);
        setTimeout(() => { 
            document.getElementById("splashScreen").style.opacity = "0";
            setTimeout(() => document.getElementById("splashScreen").style.display = "none", 800);
        }, 2500);

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('userPhoto').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('userCard').style.display = 'block';
                buluttanCek();
            }
        });
        ekraniGuncelle();
    }

    function login() { auth.signInWithPopup(provider).catch(e => alert("Hata: " + e.message)); }
    function logout() { auth.signOut().then(() => location.reload()); }

    function veriEkle() {
        const km = parseFloat(document.getElementById('km').value);
        const litre = parseFloat(document.getElementById('litre').value);
        const fiyat = parseFloat(document.getElementById('fiyat').value);
        if(!km || !litre || !fiyat) { alert("Boş alan bırakmayın!"); return; }

        const yeni = { id: Date.now(), tarih: document.getElementById('tarih').value, km, litre, fiyat, tutar: (litre*fiyat).toFixed(2) };
        yakitVerileri.push(yeni);
        localStorage.setItem('yakit_v4', JSON.stringify(yakitVerileri));
        
        if(currentUser) {
            db.collection("users").doc(currentUser.uid).set({ records: yakitVerileri });
        }
        alert("Kaydedildi!");
        sekmeDegistir('dashboard', document.querySelectorAll('.nav-item')[0]);
        ekraniGuncelle();
    }

    function buluttanCek() {
        db.collection("users").doc(currentUser.uid).get().then(doc => {
            if (doc.exists) {
                yakitVerileri = doc.data().records || [];
                localStorage.setItem('yakit_v4', JSON.stringify(yakitVerileri));
                ekraniGuncelle();
            }
        });
    }

    function ekraniGuncelle() {
        let toplamTutar = 0;
        yakitVerileri.forEach(v => toplamTutar += parseFloat(v.tutar));
        document.getElementById('dashTotal').innerText = toplamTutar.toLocaleString() + " ₺";

        if(yakitVerileri.length > 1) {
            let gidilenYol = yakitVerileri[yakitVerileri.length-1].km - yakitVerileri[0].km;
            let toplamLitre = yakitVerileri.slice(1).reduce((s, v) => s + v.litre, 0);
            if(gidilenYol > 0) {
                let ort = (toplamLitre / gidilenYol) * 100;
                document.getElementById('dashAvg').innerText = ort.toFixed(2) + " L";
                document.getElementById('dashCostKm').innerText = (toplamTutar / gidilenYol).toFixed(2) + " ₺";
            }
        }
    }

    function sekmeDegistir(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function temaSec(tema) {
        document.documentElement.className = 'theme-' + tema;
        document.body.className = 'theme-' + tema;
        localStorage.setItem('yakit_tema', tema);
    }
</script>
</body>
</html>
