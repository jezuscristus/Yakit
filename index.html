<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yakıt Takip Asistanı Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002c5f">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Yakıt Takip">

    <style>
        :root {
            --primary: #002c5f; --accent: #e63946;
            --bg-grad: linear-gradient(135deg, #e2e2e2 0%, #9bc5c3 100%);
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #222222; --text-muted: #555555; --input-bg: rgba(255, 255, 255, 0.9);
            --tilt-x: 0deg; --tilt-y: 0deg;
        }
        body.theme-gece {
            --primary: #4facfe; --accent: #ff4757;
            --bg-grad: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --glass-bg: rgba(20, 20, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff; --text-muted: #cccccc; --input-bg: rgba(0, 0, 0, 0.6);
        }
        body.theme-nline {
            --primary: #e63946; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #121212 0%, #2b2b2b 100%);
            --glass-bg: rgba(30, 30, 30, 0.8); --glass-border: rgba(230, 57, 70, 0.3);
            --text-main: #f1f1f1; --text-muted: #aaaaaa; --input-bg: rgba(15, 15, 15, 0.9);
        }
        body.theme-elite {
            --primary: #b0bec5; --accent: #ffffff;
            --bg-grad: linear-gradient(135deg, #263238 0%, #101418 100%);
            --glass-bg: rgba(40, 50, 56, 0.7); --glass-border: rgba(176, 190, 197, 0.2);
            --text-main: #eceff1; --text-muted: #90a4ae; --input-bg: rgba(20, 26, 30, 0.8);
        }
        body.theme-eco {
            --primary: #2ecc71; --accent: #f1c40f;
            --bg-grad: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(20, 35, 30, 0.7); --glass-border: rgba(46, 204, 113, 0.2);
            --text-main: #ffffff; --text-muted: #a3c2b1; --input-bg: rgba(10, 20, 15, 0.8);
        }

        .cloud-card { background: linear-gradient(135deg, rgba(66, 133, 244, 0.15), var(--glass-bg)) !important; border: 1px solid rgba(66, 133, 244, 0.3) !important; }
        .btn-google { background: #fff; color: #444; border: none; border-radius: 12px; padding: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; font-size: 13px; margin-top: 10px; }
        .btn-google:active { transform: scale(0.96); }
        .user-sync-info { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .user-meta img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .sync-text { font-size: 10px; font-weight: 800; display: block; margin-top: 2px; }
        .sync-success { color: #2ecc71; }
        .sync-loading { color: var(--primary); animation: pulse 1s infinite alternate; }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { background: var(--bg-grad); height: 100%; overflow: hidden; }
        body { background: var(--bg-grad); background-attachment: fixed; color: var(--text-main); transition: all 0.5s ease; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; perspective: 1000px; }
        
        body.privacy-mode .money-blur { filter: blur(6px); opacity: 0.6; pointer-events: none; user-select: none; transition: 0.3s ease; }

        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: all 0.8s ease-in-out; }
        .rpm-container-vip { position: relative; width: 320px; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; margin-top: -60px; transition: opacity 0.4s ease, transform 0.4s ease; }
        .rpm-gauge-vip { width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow: visible; }
        .gauge-bar-vip { stroke-width: 12; stroke-linecap: round; stroke-dasharray: 520; stroke-dashoffset: 520; animation: revUpVIP 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        #needle { transform-origin: 160px 160px; transform: rotate(-135deg); transition: transform 0.05s linear; }
        .rpm-text-vip { position: absolute; top: 190px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
        #rpmValueVip { font-size: 55px; font-weight: 800; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.4); line-height: 1; }
        .rpm-text-vip small { font-size: 14px; color: #e74c3c; font-weight: 800; letter-spacing: 4px; margin-top: 5px; }

        @keyframes revUpVIP { 0% { stroke-dashoffset: 520; filter: drop-shadow(0 0 10px rgba(46,204,113,0.8)); } 100% { stroke-dashoffset: 0; filter: drop-shadow(0 0 15px rgba(231,76,60,0.9)); } }

        .splash-title-container-vip { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; width: 100%; z-index: 2; pointer-events: none; }
        .splash-title-liquid-neon { font-size: 34px; font-weight: 800; letter-spacing: 5px; margin: 0; opacity: 0; text-align: center; line-height: 1.4; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.15); background: linear-gradient(90deg, var(--primary), var(--accent), #ffffff, var(--primary)); background-size: 300% 100%; -webkit-background-clip: text; filter: drop-shadow(0 0 15px var(--primary)); transform: scale(0.9); }
        .neon-slide { opacity: 1; transform: scale(1); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); animation: liquidFlow 3s linear infinite; }
        @keyframes liquidFlow { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

        .main-content { display: block; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px; padding-bottom: calc(95px + env(safe-area-inset-bottom)); width: 100%; }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-bar-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; width: 100%; position: relative; height: 30px;}
        .app-top-brand { font-size: 15px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.05); margin: 0; white-space: nowrap;}
        
        .privacy-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 5px 12px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; z-index: 10;}
        .privacy-btn:active { transform: scale(0.9); }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; }
        .greeting-box { display: flex; flex-direction: column; flex: 1;}
        .greeting-box p { font-size: 14px; color: var(--text-muted); margin: 0; font-weight: 600;}
        .greeting-box h1 { font-size: 22px; font-weight: 800; margin: 0; color: var(--text-main); display: flex; align-items: center; flex-wrap: wrap; gap: 8px;}
        .plaka-badge { font-size: 11px; background: var(--primary); color: #fff; padding: 3px 8px; border-radius: 6px; letter-spacing: 1px; white-space: nowrap; }
        
        .profile-pic-container { position: relative; cursor: pointer; transition: 0.3s; margin-left: 10px; }
        .profile-pic-large { width: 75px; height: 75px; min-width: 75px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; box-shadow: 0 6px 18px rgba(0,0,0,0.2); background: white;}
        .vehicle-badge { position: absolute; bottom: -5px; right: -5px; background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--glass-bg); font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(75px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom); background: var(--glass-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 25%; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-4px) scale(1.1); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }

        .card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; overflow: hidden; width: 100%;}
        .card-title { font-size: 16px; margin-bottom: 15px; padding-bottom: 5px; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 8px; border: none; letter-spacing: 0.5px;}

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; width: 100%;}
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); text-align: center; padding: 15px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .stat-card i { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
        .stat-card p { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase;}
        .stat-card h3 { font-size: 18px; color: var(--text-main); font-weight: 800; }
        .stat-card span { display: block; font-size: 8px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-top: 2px; }
        
        .chart-container { position: relative; height: 200px; width: 100%; }
        .chart-container-donut { position: relative; height: 220px; width: 100%; display: flex; justify-content: center;}

        .input-group { margin-bottom: 12px; width: 100%; box-sizing: border-box; }
        .input-group label { font-size: 12px; margin-bottom: 5px; color: var(--text-muted); font-weight: 600; display: block; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px; font-size: 14px; outline: none; background: var(--input-bg); color: var(--text-main); -webkit-appearance: none; appearance: none;}
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        .switch-container span { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-smart { flex: 1; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 12px; padding: 12px 5px; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s;}
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; transition: 0.2s;}
        .btn:active { transform: scale(0.97); }
        
        .visual-garage { position: relative; width: 100%; height: 280px; background: rgba(0,0,0,0.05); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; overflow: hidden; }
        .car-top-view { position: relative; width: 100px; height: 220px; background: linear-gradient(to bottom, var(--primary) 0%, #1a1a1a 100%); border-radius: 30px; border: 2px solid var(--glass-border); }
        .tire { position: absolute; width: 20px; height: 45px; background: #222; border-radius: 5px; z-index: 1;}
        .tire-fl { top: 25px; left: -10px; } .tire-fr { top: 25px; right: -10px; }
        .tire-rl { bottom: 25px; left: -10px; } .tire-rr { bottom: 25px; right: -10px; }
        
        .psi-badge { position: absolute; background: var(--glass-bg); backdrop-filter: blur(5px); color: var(--text-main); font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 8px; border: 1px solid var(--glass-border); z-index: 3;}
        .psi-fl { top: 20px; left: -60px; } .psi-fr { top: 20px; right: -60px; }
        .psi-rl { bottom: 20px; left: -60px; } .psi-rr { bottom: 20px; right: -60px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; color: var(--text-main); }
        th, td { padding: 10px 5px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { font-weight: 600; color: var(--primary); }
        .status-partial { color: var(--accent); font-weight: bold; }
        .status-full { color: #2ecc71; font-weight: bold; }

        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #tripModal { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--glass-bg); backdrop-filter: blur(20px); border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; z-index: 10005; transition: 0.4s; }
        #tripModal.open { bottom: 0; }
    </style>
</head>
<body onload="uygulamayiBaslat()">

    <div id="splashScreen">
        <div class="rpm-container-vip">
            <svg class="rpm-gauge-vip" viewBox="0 0 320 320">
                <defs>
                    <linearGradient id="multiColorGradient" x1="0%" y1="100%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#2ecc71" /><stop offset="50%" stop-color="#4facfe" /><stop offset="100%" stop-color="#e74c3c" />
                    </linearGradient>
                </defs>
                <path d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
                <path class="gauge-bar-vip" d="M 60 260 A 120 120 0 1 1 260 260" fill="none" stroke="url(#multiColorGradient)" />
                <g id="needle">
                    <polygon points="157,160 163,160 160,55" fill="#fff"/>
                    <circle cx="160" cy="160" r="16" fill="#050505" stroke="#333" stroke-width="4"/>
                </g>
            </svg>
            <div class="rpm-text-vip"><span id="rpmValueVip">0</span> <small>RPM</small></div>
        </div>
        <div class="splash-title-container-vip">
            <h1 class="splash-title-liquid-neon">YAKIT TAKİP<br>ASİSTANI</h1>
        </div>
    </div>

    <div id="tripModal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; font-weight:800;">
            <span><i class="fas fa-map-marked-alt"></i> Akıllı Yolculuk</span>
            <i class="fas fa-times" onclick="kapatTripModal()" style="color:var(--accent); cursor:pointer;"></i>
        </div>
        <div class="input-group">
            <label>Hedef Mesafe (KM)</label>
            <input type="number" id="tripKm" placeholder="Örn: 450" oninput="hesaplaTrip('km')">
        </div>
        <div id="tripResultBox" style="text-align:center; padding:15px; background:rgba(0,0,0,0.05); border-radius:12px; display:none;">
            <h3 id="tripResPrimary" style="font-size:24px; color:var(--primary);">0 ₺</h3>
            <p id="tripResSecondary" style="font-size:12px; font-weight:600; color:var(--text-muted);"></p>
        </div>
    </div>

    <div class="main-content" id="mainApp" style="display:none; opacity:0;">
        
        <div class="top-bar-container">
            <div class="app-top-brand"><i class="fas fa-gas-pump"></i> Yakıt Takip Asistanı</div>
            <div style="display:flex; gap:8px;">
                <div class="privacy-btn" onclick="acTripModal()"><i class="fas fa-map-marked-alt"></i></div>
                <div class="privacy-btn" onclick="togglePrivacy()"><i class="fas fa-eye-slash" id="privacyIcon"></i></div>
            </div>
        </div>

        <div class="header-top">
            <div class="greeting-box">
                <p>İyi Sürüşler,</p>
                <h1 id="kullaniciGosterge">Sürücü <span id="plakaGosterge" class="plaka-badge" style="display:none;"></span></h1>
            </div>
            <div class="profile-pic-container" onclick="switchVehicleProfile()">
                <img src="" class="profile-pic-large" id="headerProfilePic">
                <div class="vehicle-badge" id="vehicleBadge"><i class="fas fa-car"></i></div>
            </div>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            <div class="dashboard">
                <div class="stat-card"><i class="fas fa-tint"></i><p>Ortalama</p><h3 id="dashAvg">- L</h3></div>
                <div class="stat-card"><i class="fas fa-road"></i><p>Menzil</p><h3 id="dashRange">- KM</h3></div>
                <div class="stat-card"><i class="fas fa-wallet"></i><p>Harcama</p><h3 id="dashTotalCost" class="money-blur">0 ₺</h3></div>
                <div class="stat-card"><i class="fas fa-coins"></i><p>TL / KM</p><h3 id="dashCostPerKm" class="money-blur">- ₺</h3></div>
            </div>
            
            <div class="card">
                <h2 class="card-title"><i class="fas fa-chart-line"></i> Tüketim Trendi</h2>
                <div class="chart-container"><canvas id="yakitGrafigi"></canvas></div>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> Yakıt Bilgileri</h2>
                
                <div class="switch-container">
                    <span><i class="fas fa-gas-pump"></i> Depo Fullendi mi?</span>
                    <label class="switch">
                        <input type="checkbox" id="isFull" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="input-group"><label>Tarih</label><input type="date" id="tarih"></div>
                <div class="input-group">
                    <label>İstasyon</label>
                    <select id="istasyon">
                        <option>Shell</option><option>Opet</option><option>BP</option><option>Petrol Ofisi</option><option>Diğer</option>
                    </select>
                </div>
                <div class="input-group"><label>Güncel KM</label><input type="number" id="km" placeholder="Örn: 15200"></div>
                <div class="input-group"><label>Alınan Litre</label><input type="number" step="0.01" id="litre" placeholder="Örn: 35.5"></div>
                <div class="input-group"><label>Litre Fiyatı (₺)</label><input type="number" step="0.01" id="fiyat" placeholder="Örn: 43.50"></div>
                <button class="btn" onclick="veriEkle()"><i class="fas fa-save"></i> Kaydet</button>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="card">
                <h2 class="card-title"><span><i class="fas fa-history"></i> Kayıtlar</span></h2>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Tarih</th><th>Durum</th><th>KM</th><th>Litre</th><th>Tutar</th><th>Ort.</th><th>Sil</th></tr></thead>
                        <tbody id="tabloGövdesi"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-car"></i> Araç Bilgileri</h2>
                <div class="input-group"><label>Ad Soyad</label><input type="text" id="adSoyad"></div>
                <div class="input-group"><label>Plaka</label><input type="text" id="plakaNo"></div>
                <div class="input-group"><label>Depo Hacmi (Litre)</label><input type="number" id="depoHacmi" value="50"></div>
                <button class="btn" onclick="profilKaydet()">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="sekmeDegistir('dashboard', this)"><i class="fas fa-home"></i><span>Özet</span></div>
        <div class="nav-item" onclick="sekmeDegistir('add', this)"><i class="fas fa-plus-circle"></i><span>Ekle</span></div>
        <div class="nav-item" onclick="sekmeDegistir('history', this)"><i class="fas fa-list"></i><span>Geçmiş</span></div>
        <div class="nav-item" onclick="sekmeDegistir('profile', this)"><i class="fas fa-user-cog"></i><span>Ayarlar</span></div>
    </div>

<script>
    let activeProfile = localStorage.getItem('app_active_profile') || 'car'; 
    let yakitVerileri = []; 
    let profilVerileri = {};
    let yakitGrafigi;
    let globalGuncelOrtalama = 0; 
    let globalSonFiyat = 0;

    function titret(ms) { if ("vibrate" in navigator) { navigator.vibrate(ms); } }

    function loadProfileData() {
        yakitVerileri = JSON.parse(localStorage.getItem('app_data_' + activeProfile)) || [];
        let def = { ad: 'Sürücü', plaka: '', depoHacmi: 50, resim: '' };
        profilVerileri = JSON.parse(localStorage.getItem('app_profile_' + activeProfile)) || def;
    }

    function saveProfileData() {
        localStorage.setItem('app_data_' + activeProfile, JSON.stringify(yakitVerileri));
        localStorage.setItem('app_profile_' + activeProfile, JSON.stringify(profilVerileri));
    }

    // --- KÜMÜLATİF HESAPLAMA MOTORU ---
    function ekraniGuncelle() {
        let tablo = document.getElementById('tabloGövdesi'); tablo.innerHTML = "";
        let etiketler = []; let grafikData = [];
        let toplamTutar = 0;
        
        // Tabloyu oluştururken kümülatif hesabı yap
        let bekleyenLitre = 0;
        let sonFullKm = yakitVerileri.length > 0 ? yakitVerileri[0].km : 0;

        yakitVerileri.forEach((v, index) => {
            toplamTutar += parseFloat(v.tutar);
            let gostergeOrtalama = "-";

            if (index > 0) {
                bekleyenLitre += parseFloat(v.litre);
                
                // Eğer bu kayıt "Full Dolum" ise hesapla
                if (v.isFull) {
                    let mesafe = v.km - sonFullKm;
                    if (mesafe > 0) {
                        let hesap = (bekleyenLitre / mesafe) * 100;
                        v.hesaplanmısTuketim = hesap.toFixed(2);
                        gostergeOrtalama = v.hesaplanmısTuketim + " L";
                        
                        etiketler.push(v.km);
                        grafikData.push(hesap.toFixed(2));
                        
                        // Bir sonraki hesaplama için sıfırla
                        globalGuncelOrtalama = hesap; 
                        bekleyenLitre = 0;
                        sonFullKm = v.km;
                    }
                }
            } else {
                // İlk kayıt her zaman referanstır
                sonFullKm = v.km;
                bekleyenLitre = 0; 
            }

            // Tabloya Ekle (Sondan başa)
            let statusHtml = v.isFull ? '<span class="status-full">FULL</span>' : '<span class="status-partial">YARIM</span>';
            let row = `<tr>
                <td>${v.tarih}</td>
                <td>${statusHtml}</td>
                <td>${v.km}</td>
                <td>${v.litre}L</td>
                <td>${v.tutar}₺</td>
                <td>${gostergeOrtalama}</td>
                <td><button onclick="kayitSil(${v.id})" style="border:none; background:none; color:red;"><i class="fas fa-trash"></i></button></td>
            </tr>`;
            tablo.insertAdjacentHTML('afterbegin', row);
        });

        // Dashboard'u Guncelle
        document.getElementById('dashTotalCost').innerText = toplamTutar.toFixed(0) + " ₺";
        if (yakitVerileri.length > 0) {
            globalSonFiyat = yakitVerileri[yakitVerileri.length-1].tutar / yakitVerileri[yakitVerileri.length-1].litre;
            if(globalGuncelOrtalama > 0) {
                document.getElementById('dashAvg').innerText = globalGuncelOrtalama.toFixed(2) + " L";
                document.getElementById('dashCostPerKm').innerText = ((globalGuncelOrtalama / 100) * globalSonFiyat).toFixed(2) + " ₺";
                let menzil = (profilVerileri.depoHacmi / globalGuncelOrtalama) * 100;
                document.getElementById('dashRange').innerText = Math.round(menzil) + " KM";
            }
        }
        grafikCiz(etiketler, grafikData);
    }

    function veriEkle() {
        let t = document.getElementById('tarih').value;
        let k = parseInt(document.getElementById('km').value);
        let l = parseFloat(document.getElementById('litre').value);
        let f = parseFloat(document.getElementById('fiyat').value);
        let isFull = document.getElementById('isFull').checked;

        if(!t || !k || !l || !f) return alert("Boş alan bırakmayın.");
        if(yakitVerileri.length > 0 && k <= yakitVerileri[yakitVerileri.length-1].km) return alert("KM önceki kayıttan küçük olamaz.");

        yakitVerileri.push({
            id: Date.now(),
            tarih: t,
            km: k,
            litre: l,
            tutar: (l * f).toFixed(2),
            isFull: isFull,
            istasyon: document.getElementById('istasyon').value
        });

        saveProfileData();
        ekraniGuncelle();
        sekmeDegistir('dashboard', document.querySelectorAll('.nav-item')[0]);
        
        // Form Temizle
        document.getElementById('km').value = "";
        document.getElementById('litre').value = "";
        document.getElementById('fiyat').value = "";
    }

    function grafikCiz(etiketler, veriler) {
        let ctx = document.getElementById('yakitGrafigi').getContext('2d');
        if(yakitGrafigi) yakitGrafigi.destroy();
        yakitGrafigi = new Chart(ctx, { 
            type: 'line', 
            data: { labels: etiketler, datasets: [{ data: veriler, borderColor: '#002c5f', backgroundColor: 'rgba(0,44,95,0.1)', tension: 0.4, fill: true }] }, 
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } 
        });
    }

    function uygulamayiBaslat() {
        loadProfileData();
        profilYukle();
        document.getElementById('tarih').valueAsDate = new Date();

        // Splash Animasyon
        let rpmVal = document.getElementById("rpmValueVip");
        let needle = document.getElementById("needle");
        let start = null;
        function rpmStep(ts) {
            if (!start) start = ts;
            let progress = ts - start;
            let cur = Math.min((progress / 1500) * 8000, 8000);
            needle.style.transform = `rotate(${-135 + (cur / 8000) * 270}deg)`;
            rpmVal.innerText = Math.floor(cur);
            if (progress < 1500) requestAnimationFrame(rpmStep); 
            else {
                setTimeout(() => {
                    document.getElementById('splashScreen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splashScreen').style.display = 'none';
                        document.getElementById('mainApp').style.display = 'block';
                        setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; ekraniGuncelle(); }, 50);
                    }, 800);
                }, 500);
            }
        }
        requestAnimationFrame(rpmStep);
    }

    function sekmeDegistir(s, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + s).classList.add('active'); 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        titret(10);
    }

    function togglePrivacy() {
        document.body.classList.toggle('privacy-mode');
        titret(15);
    }

    function kayitSil(id) {
        if(confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
            yakitVerileri = yakitVerileri.filter(v => v.id !== id);
            saveProfileData();
            ekraniGuncelle();
        }
    }

    function acTripModal() { document.getElementById('tripModal').classList.add('open'); }
    function kapatTripModal() { document.getElementById('tripModal').classList.remove('open'); }
    function hesaplaTrip(m) {
        if(globalGuncelOrtalama === 0) return;
        let km = parseFloat(document.getElementById('tripKm').value);
        if(!km) return;
        let maliyet = (km / 100) * globalGuncelOrtalama * globalSonFiyat;
        document.getElementById('tripResPrimary').innerText = maliyet.toFixed(0) + " ₺";
        document.getElementById('tripResSecondary').innerText = ((km / 100) * globalGuncelOrtalama).toFixed(2) + " L Yakıt Gerekli";
        document.getElementById('tripResultBox').style.display = 'block';
    }

    function profilKaydet() {
        profilVerileri.ad = document.getElementById('adSoyad').value;
        profilVerileri.plaka = document.getElementById('plakaNo').value;
        profilVerileri.depoHacmi = document.getElementById('depoHacmi').value;
        saveProfileData();
        profilYukle();
        alert("Profil Güncellendi.");
    }

    function profilYukle() {
        document.getElementById('kullaniciGosterge').innerHTML = (profilVerileri.ad || 'Sürücü') + ` <span id="plakaGosterge" class="plaka-badge">${profilVerileri.plaka || ''}</span>`;
        document.getElementById('adSoyad').value = profilVerileri.ad || '';
        document.getElementById('plakaNo').value = profilVerileri.plaka || '';
        document.getElementById('depoHacmi').value = profilVerileri.depoHacmi || 50;
        document.getElementById('headerProfilePic').src = profilVerileri.resim || "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NjYyI+PHBhdGggZD0iTTEyIDJhNSA1IDAgMSAwIDAgMTAgNSA1IDAgMCAwIDAtMTB6bTAgMTJjLTMuMyAwLTkuOSAxLjctOS45IDVWMThoMTkuOFYxOWMwLTMuMy02LjYtNS05LjktNXoiLz48L3N2Zz4=";
    }
</script>
</body>
</html>
